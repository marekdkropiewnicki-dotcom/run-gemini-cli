name: 'Nightly Evaluations'

permissions:
  contents: 'read'

on:
  schedule:
    - cron: '0 1 * * *' # 1 AM UTC
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of iterations per test case'
        required: true
        default: '1'

jobs:
  list-evals:
    runs-on: 'ubuntu-22.04'
    outputs:
      matrix: '${{ steps.set-matrix.outputs.matrix }}'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6' # ratchet:exclude
      - id: 'set-matrix'
        run: |
          FILES=$(find evals -maxdepth 1 -name "*.eval.ts" | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=${FILES}" >> "$GITHUB_OUTPUT"

  evaluate:
    needs: 'list-evals'
    runs-on: 'ubuntu-22.04'
    strategy:
      fail-fast: false
      matrix:
        model: ['gemini-3-flash-preview']
        eval-file: '${{ fromJson(needs.list-evals.outputs.matrix) }}'
    name: 'Evaluate ${{ matrix.eval-file }} (${{ matrix.model }})'

    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6' # ratchet:exclude

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@v4' # ratchet:exclude
        with:
          node-version: '20'
          cache: 'npm'

      - name: 'Install dependencies'
        # Retry logic for transient network or package retrieval failures
        run: |
          npm ci || (sleep 10 && npm ci) || (sleep 30 && npm ci)

      - name: 'Install Gemini CLI'
        # Retry logic for transient network or package retrieval failures
        run: |
          npm install -g @google/gemini-cli@latest || (sleep 10 && npm install -g @google/gemini-cli@latest) || (sleep 30 && npm install -g @google/gemini-cli@latest)

      - name: 'Run Evaluations'
        id: 'run_evals'
        env:
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          GOOGLE_API_KEY: '${{ secrets.GOOGLE_API_KEY }}'
          GEMINI_MODEL: '${{ matrix.model }}'
        run: |
          BASE_NAME=$(basename "${{ matrix.eval-file }}" .eval.ts)
          REPORT_FILE="eval-results-${{ matrix.model }}-${BASE_NAME}.json"

          # Run tests and ignore exit code
          npm run test:evals -- "${{ matrix.eval-file }}" --reporter=json --outputFile="$REPORT_FILE" || true

          # Check if report was generated
          if [ ! -f "$REPORT_FILE" ]; then
            echo "❌ Report file $REPORT_FILE was not generated. The evaluation likely crashed."
            exit 1
          fi
          echo "✅ Report file generated. Continuing."

      - name: 'Upload Results'
        if: 'always()'
        uses: 'actions/upload-artifact@v4' # ratchet:exclude
        with:
          name: 'eval-results-${{ matrix.model }}-${{ strategy.job-index }}'
          path: 'eval-results-${{ matrix.model }}-*.json'

  report:
    needs: 'evaluate'
    if: 'always()'
    runs-on: 'ubuntu-22.04'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6' # ratchet:exclude

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@v4' # ratchet:exclude
        with:
          node-version: '20'
          cache: 'npm'

      - name: 'Install dependencies'
        # Retry logic for transient network or package retrieval failures
        run: |
          npm ci || (sleep 10 && npm ci) || (sleep 30 && npm ci)

      - name: 'Download Results'
        uses: 'actions/download-artifact@v4' # ratchet:exclude
        with:
          path: 'eval-results'
          pattern: 'eval-results-*'
          merge-multiple: true

      - name: 'Aggregate All Results'
        run: |
          npx tsx scripts/aggregate_evals.ts eval-results/*.json >> "$GITHUB_STEP_SUMMARY"
